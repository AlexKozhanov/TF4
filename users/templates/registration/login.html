{% extends 'diary/includes/template.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container px-4 py-5" id="featured-3">
    <h2 class="pb-2 border-bottom text-center">Вход на сайт</h2>
    <p class="lead text-center">Форма для работы</p>

    <form class="row" method="post" enctype="multipart/form-data">
        <div class="col-6">
                <form method="post">
                    {% csrf_token %}
                    {{ form.non_field_errors }}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">
                        Войти
                    </button>
                    <a href="{% url 'diary:home' %}">Отмена</a>
                    <div class="card-footer">
                        <a href="{% url 'users:password_recovery' %}">Забыли пароль?</a>
                    </div>
                </form>
        </div>
    </form>
</div>
{% endblock %}
