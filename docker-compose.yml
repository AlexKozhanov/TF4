services:
  db:
    image: postgres:16
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg-isready -h db -U $POSTGRES_USER" ]
      interval: 10s
      timeout: 5s
      retries: 5


  redis:
    image: redis
    expose:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - redis_data:/data


  web:
    build: .
    command: sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      - db
    env_file:
      - ./.env


  nginx:
    build: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/staticfiles
    depends_on:
      - web


  celery_beat:
    build: .
    command: celery -A config beat --loglevel=info
    env_file: .env
    volumes:
      - ./celery_beat:/app/celery_beat
    depends_on:
      - redis
      - db


  celery_worker:
    build: .
    command: celery -A config worker --loglevel=INFO
    env_file: .env
    depends_on:
      - redis
      - db


networks:
  default:


volumes:
  postgres_data:
  static_volume:
  redis_data: