services:
  db:
    image: postgres:16
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg-isready -h db -U $POSTGRES_USER" ]
      interval: 10s
      timeout: 5s
      retries: 5


  web:
    build: .
    command: sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      - db
    env_file:
      - ./.env


networks:
  default:


volumes:
  postgres_data:
  static_volume:
  redis_data: