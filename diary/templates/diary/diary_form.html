{% extends 'diary/includes/template.html' %}
{% block content %}
<!-- Раздел2 Категории -->
<div class="container px-4 py-5" id="featured-3"> <!-- container с текстами -->
    <h2 class="pb-2 border-bottom text-center">diary</h2>
    <p class="lead text-center">Форма для работы с diary</p>

    <form class="row" method="post" enctype="multipart/form-data"> <!-- Разделять формы -->
        <div class="col-6">
            {% if object %}
            <h1 class="mb-4">Редактирование diary</h1>
            {% else %}
            <h1 class="mb-4">Создание diary</h1>
            {% endif %}
            <form method="post">
                {% csrf_token %}
<!--                {{ form.non_field_errors }}-->
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="{% url 'diary:diary_list' %}">Отмена</a>
            </form>
        </div>
    </form>
</div>
{% endblock %}
